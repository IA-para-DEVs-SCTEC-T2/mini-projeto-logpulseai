name: "Branch Naming Rules"

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    name: Validate branch name
    
    steps:
      - name: Validar formato do nome da branch
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          
          echo "🔍 Validando nome da branch: $BRANCH_NAME"
          echo ""
          
          # Branches protegidas permitidas
          if [[ "$BRANCH_NAME" == "main" ]]; then
            echo "✅ Branch protegida permitida: $BRANCH_NAME"
            exit 0
          fi
          
          # Valida o padrão: feature/<nome> ou bugfix/<nome>
          # Apenas letras minúsculas, números e hífens no nome
          # Mínimo 3 caracteres no nome após o prefixo
          if ! echo "$BRANCH_NAME" | grep -qE "^(feature|bugfix)/[a-z0-9-]{3,}$"; then
            echo "❌ ERRO: Nome da branch inválido!"
            echo ""
            echo "Branch atual: $BRANCH_NAME"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📋 PADRÃO ACEITO (GitHub Flow):"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "  feature/<nome-da-tarefa>"
            echo "  bugfix/<nome-da-tarefa>"
            echo "  main"
            echo ""
            echo "  • Nome da tarefa: mínimo 3 caracteres"
            echo "  • Apenas letras minúsculas, números e hífens"
            echo "  • Sem espaços, underscores ou caracteres especiais"
            echo "  • Sem letras maiúsculas"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ EXEMPLOS VÁLIDOS:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "  ✅ main"
            echo "  ✅ feature/analise-logs-ia"
            echo "  ✅ feature/parser-json"
            echo "  ✅ bugfix/correcao-bug-123"
            echo "  ✅ bugfix/correcao-timeout"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ EXEMPLOS INVÁLIDOS:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "  ❌ develop (não existe mais no GitHub Flow)"
            echo "  ❌ hotfix/bug-critico (use bugfix/ ao invés de hotfix/)"
            echo "  ❌ release/v1.0.0 (não existe mais no GitHub Flow)"
            echo "  ❌ feature-nova-feature (use '/' ao invés de '-' após o tipo)"
            echo "  ❌ feature/Teste (não use letras maiúsculas)"
            echo "  ❌ feature/teste_branch (use hífens ao invés de underscores)"
            echo "  ❌ feature/ab (nome muito curto, mínimo 3 caracteres)"
            echo "  ❌ master (use 'main')"
            echo "  ❌ ajustes (falta o prefixo 'feature/' ou 'bugfix/')"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            exit 1
          fi
          
          echo "✅ Nome da branch válido!"
          echo ""
