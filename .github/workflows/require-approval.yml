name: Require PR Approval

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  check-approvals:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch and approvals (GitFlow)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sourceBranch = context.payload.pull_request.head.ref;
            const targetBranch = context.payload.pull_request.base.ref;
            
            console.log('='.repeat(50));
            console.log('🔀 GitFlow - Validação de Branch');
            console.log('='.repeat(50));
            console.log(`Branch de origem: ${sourceBranch}`);
            console.log(`Branch de destino: ${targetBranch}`);
            console.log('='.repeat(50));

            // Validar fluxo GitFlow baseado na branch de destino
            let isValidFlow = false;
            let errorMessage = '';

            if (targetBranch === 'main' || targetBranch === 'master') {
              // Para main: apenas develop, release/* ou hotfix/*
              if (sourceBranch === 'develop') {
                isValidFlow = true;
                console.log('✅ Fluxo válido: develop → main (release)');
              } else if (sourceBranch.startsWith('release/')) {
                isValidFlow = true;
                console.log('✅ Fluxo válido: release/* → main');
              } else if (sourceBranch.startsWith('hotfix/')) {
                isValidFlow = true;
                console.log('✅ Fluxo válido: hotfix/* → main');
              } else {
                errorMessage = `❌ FLUXO GITFLOW INVÁLIDO\n\n` +
                  `Para fazer merge em '${targetBranch}', apenas estas branches são permitidas:\n` +
                  `  • develop\n` +
                  `  • release/*\n` +
                  `  • hotfix/*\n\n` +
                  `Branch atual: ${sourceBranch}`;
              }
            } else if (targetBranch === 'develop') {
              // Para develop: apenas feature/*, bugfix/*, release/* ou hotfix/*
              if (sourceBranch.startsWith('feature/') || 
                  sourceBranch.startsWith('bugfix/') ||
                  sourceBranch.startsWith('release/') ||
                  sourceBranch.startsWith('hotfix/')) {
                isValidFlow = true;
                console.log(`✅ Fluxo válido: ${sourceBranch} → develop`);
              } else {
                errorMessage = `❌ FLUXO GITFLOW INVÁLIDO\n\n` +
                  `Para fazer merge em 'develop', apenas estas branches são permitidas:\n` +
                  `  • feature/*\n` +
                  `  • bugfix/*\n` +
                  `  • release/* (merge back)\n` +
                  `  • hotfix/* (merge back)\n\n` +
                  `Branch atual: ${sourceBranch}`;
              }
            } else {
              // Outras branches de destino não são protegidas
              isValidFlow = true;
              console.log('ℹ️ Branch de destino não protegida, permitindo merge');
            }

            if (!isValidFlow) {
              core.setFailed(errorMessage);
              return;
            }

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            // Filtrar apenas as reviews mais recentes de cada revisor
            const latestReviews = {};
            reviews.forEach(review => {
              if (!latestReviews[review.user.login] || 
                  new Date(review.submitted_at) > new Date(latestReviews[review.user.login].submitted_at)) {
                latestReviews[review.user.login] = review;
              }
            });

            // Contar aprovações válidas (excluindo o autor do PR)
            const approvals = Object.values(latestReviews).filter(review => 
              review.state === 'APPROVED' && 
              review.user.login !== context.payload.pull_request.user.login
            );

            console.log(`Total de aprovações válidas: ${approvals.length}`);
            console.log(`Revisores que aprovaram: ${approvals.map(r => r.user.login).join(', ')}`);

            if (approvals.length === 0) {
              core.setFailed('❌ Este Pull Request precisa de pelo menos 1 aprovação antes do merge.');
            } else {
              console.log('✅ Pull Request tem aprovação suficiente para merge.');
            }
