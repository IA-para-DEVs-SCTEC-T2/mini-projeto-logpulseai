# Configurações de proteção de branches do repositório
# Este arquivo pode ser usado com o GitHub App "Settings" ou aplicado manualmente

repository:
  # Configurações gerais do repositório
  name: logpulse-ia
  description: "Ferramenta CLI e biblioteca Python para ingestão, análise e investigação inteligente de logs"
  homepage: ""
  topics: python, cli, logs, ai, llm, monitoring
  private: false
  has_issues: true
  has_projects: true
  has_wiki: false
  has_downloads: true
  default_branch: main
  allow_squash_merge: true
  allow_merge_commit: true
  allow_rebase_merge: true
  delete_branch_on_merge: true
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true

# Regras de proteção de branches
branches:
  - name: main
    protection:
      # Exige pull request antes de fazer merge
      required_pull_request_reviews:
        # Número mínimo de aprovações necessárias
        required_approving_review_count: 1
        # Descarta aprovações antigas quando novos commits são adicionados
        dismiss_stale_reviews: true
        # Exige revisão de code owners (se houver arquivo CODEOWNERS)
        require_code_owner_reviews: false
        # Restringe quem pode descartar revisões
        dismissal_restrictions:
          users: []
          teams: []
        # Bloqueia o autor do PR de aprovar seu próprio PR
        require_last_push_approval: true
      
      # Exige que status checks passem antes do merge
      required_status_checks:
        # Exige que a branch esteja atualizada antes do merge
        strict: true
        # Lista de checks que devem passar
        checks:
          - context: "Validar nome da branch"
            app_id: -1  # GitHub Actions
          - context: "Validar mensagens de commit"
            app_id: -1  # GitHub Actions
      
      # Exige commits assinados
      require_signatures: false
      
      # Exige resolução de conversas antes do merge
      required_conversation_resolution: true
      
      # Restrições de push direto
      enforce_admins: true
      restrictions:
        users: []
        teams: []
        apps: []
      
      # Permite force push
      allow_force_pushes: false
      
      # Permite deleção da branch
      allow_deletions: false
      
      # Bloqueia criação da branch
      block_creations: false
      
      # Exige deploy bem-sucedido antes do merge
      required_linear_history: false
      
      # Lock branch (somente leitura)
      lock_branch: false
